# musicli default configuration.
# This file is embedded into the binary and written to the user config
# directory on first run.

[audio]
volume = 80          # 0-100
speed = 1.0          # 0.5-2.0 (playback speed, pitch preserved via ffmpeg atempo)

[playback]
repeat = "list"      # none | one | list
shuffle = false

[library]
sort_field = "title" # title | artist | album | size | year
sort_order = "asc"   # asc | desc
group_by_album = false
music_dir = ""       # empty = command-line path, then current directory
index_cache = true    # reuse unchanged library metadata between launches

[lyrics]
auto_fetch = false   # auto-crawl lyrics when local file missing (phase 12)
sources = ["lrclib", "qq", "netease", "kugou"]
save_dir = ""        # empty = ~/.cache/musicli/lyrics
align = "left"       # left | center | right

[cover]
show = true
protocol = "auto"    # auto | kitty | sixel | iterm | halfblock
scale = "fit"        # fit | stretch

[dbus]
mpris = true          # expose org.mpris.MediaPlayer2.musicli
lyrics = true         # expose io.github.locxl.musicli.Lyrics

[theme]
mode = "auto"        # auto | dark | light
name = "default"

[ui]
track_list_max_width = 80 # 0 = unlimited; otherwise cap the content-fit track list width

[keybindings]
# Empty = use built-in defaults. Override individual keys here, e.g.:
# play_pause = ["space", "p"]
# next = ["n", "l"]
# Built-in playlist keys: p playlists, f favorite, m add selected track,
# N new playlist, x remove playlist track, o sort playlist, d delete playlist.

[log]
level = "debug"      # debug | info | warning | error
file = ""            # empty = ~/.local/state/musicli/musicli.log
