# musicli default configuration.
# This file is embedded into the binary and written to the user config
# directory on first run.

[audio]
volume = 80          # 0-100
speed = 1.0          # 0.5-2.0 (playback speed, pitch preserved via ffmpeg atempo)

[playback]
repeat = "list"      # none | one | list
shuffle = false

[library]
sort_field = "title" # title | artist | album | size | year
sort_order = "asc"   # asc | desc
group_by_album = false
music_dir = ""       # empty = command-line path, then current directory
index_cache = true    # reuse unchanged library metadata between launches

[lyrics]
auto_fetch = false   # auto-crawl lyrics when local file missing (phase 12)
sources = ["lrclib", "qq", "netease", "kugou"]
save_dir = ""        # empty = ~/.cache/musicli/lyrics
align = "left"       # left | center | right
highlight_mode = "played" # played | current; played includes every word that has started

[spectrum]
enabled = false       # show the responsive PCM spectrum at startup; z toggles for this session
update_hz = 50        # PCM/FFT refresh rate, 10-200; higher is more responsive but uses more CPU

[cover]
show = true
protocol = "auto"    # auto | kitty | sixel | iterm | halfblock
scale = "fit"        # fit | stretch

[dbus]
mpris = true          # expose org.mpris.MediaPlayer2.musicli
lyrics = true         # expose io.github.locxl.musicli.Lyrics

[theme]
mode = "auto"        # auto | dark | light
dark = ""             # .theme file; relative paths use ~/.config/musicli/
light = ""            # .theme file; relative paths use ~/.config/musicli/

[ui]
track_list_max_width = 80 # 0 = unlimited; otherwise cap the content-fit track list width
progress_style = "bar"   # bar | separator; separator uses a pixel-level kitty overlay when available
separator_progress_thickness = 1 # 1-8 pixels; kitty separator overlay only

[keybindings]
# Omit an action to use its built-in default. Each value is one or more Bubble Tea key strings.
# play_pause = ["space", "p"]
# next = ["n", "l"]
# Supported actions: play_pause, next, prev, repeat, shuffle, lyric_align,
# lyric_highlight, spectrum, view, scale, list, playlists, favorite,
# remove_playlist_track, sort_playlist, delete_playlist, add_playlist,
# new_playlist, back, seek_forward, seek_backward, volume_up, volume_down,
# speed_up, speed_down, quit, enter, up, down, filter.

[log]
level = "debug"      # debug | info | warning | error
file = ""            # empty = ~/.local/state/musicli/musicli.log
